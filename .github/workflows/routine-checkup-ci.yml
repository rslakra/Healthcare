name: RoutineCheckup CI

on:
  push:
    paths:
      - "routine-checkup/**"
      - ".github/workflows/routine-checkup-ci.yml"
  pull_request:
    paths:
      - "routine-checkup/**"
      - ".github/workflows/routine-checkup-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: routine-checkup

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: routine-checkup/pom.xml

      - name: Build and run unit tests
        run: mvn -B -ntp test
