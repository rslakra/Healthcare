name: PetSuite CI

on:
  push:
    paths:
      - "PetSuite/**"
      - ".github/workflows/petsuite-ci.yml"
  pull_request:
    paths:
      - "PetSuite/**"
      - ".github/workflows/petsuite-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: PetSuite

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: PetSuite/pom.xml

      - name: Build and run unit tests
        run: mvn -B -ntp test
